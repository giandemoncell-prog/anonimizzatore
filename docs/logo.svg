<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Anonimizzatore logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>

  <!-- Lock shackle (arch) -->
  <path d="M198,252 C198,156 314,156 314,252"
        fill="none" stroke="white" stroke-width="36"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lock body -->
  <rect x="148" y="244" width="216" height="172" rx="26" fill="white"/>

  <!-- Keyhole -->
  <circle cx="256" cy="316" r="24" fill="#1e40af"/>
  <rect x="247" y="316" width="18" height="32" rx="9" fill="#1e40af"/>

  <!-- Document lines (subtle, inside lock body) -->
  <rect x="186" y="382" width="140" height="10" rx="5" fill="#bfdbfe" opacity="0.6"/>
  <rect x="186" y="398" width="104" height="10" rx="5" fill="#bfdbfe" opacity="0.6"/>

  <!-- Shield accent lines (top corners, subtle) -->
  <path d="M108,108 L148,68" stroke="white" stroke-width="3" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M404,108 L364,68" stroke="white" stroke-width="3" stroke-opacity="0.15" stroke-linecap="round"/>
</svg>
