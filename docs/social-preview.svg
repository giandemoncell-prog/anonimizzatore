<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Anonimizzatore General Purpose — social preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="lockbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent strip left -->
  <rect width="600" height="630" fill="url(#accent)"/>

  <!-- Decorative circles (background) -->
  <circle cx="950" cy="100" r="260" fill="#1d4ed8" opacity="0.08"/>
  <circle cx="1050" cy="480" r="180" fill="#3b82f6" opacity="0.06"/>
  <circle cx="700" cy="580" r="120" fill="#2563eb" opacity="0.05"/>

  <!-- Left border accent line -->
  <rect x="0" y="0" width="5" height="630" fill="#2563eb" opacity="0.8"/>

  <!-- ── LEFT SECTION: Text ─────────────────────────────── -->

  <!-- Logo icon (small) -->
  <rect x="64" y="72" width="56" height="56" rx="12" fill="url(#iconbg)"/>
  <!-- Lock arch small -->
  <path d="M80,104 C80,84 104,84 104,104" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Lock body small -->
  <rect x="74" y="102" width="30" height="22" rx="5" fill="white"/>
  <!-- Keyhole small -->
  <circle cx="89" cy="111" r="4" fill="#1e40af"/>
  <rect x="87" y="111" width="4" height="7" rx="2" fill="#1e40af"/>

  <!-- Brand name next to logo -->
  <text x="134" y="107" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="18" font-weight="700" fill="#93c5fd" letter-spacing="2">
    ANONIMIZZATORE
  </text>

  <!-- Divider line -->
  <rect x="64" y="152" width="80" height="3" rx="2" fill="#2563eb"/>

  <!-- Main headline -->
  <text x="64" y="230" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="white" letter-spacing="-1">
    Anonimizza
  </text>
  <text x="64" y="316" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="white" letter-spacing="-1">
    i tuoi documenti.
  </text>
  <text x="64" y="390" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="56" font-weight="800" fill="#60a5fa" letter-spacing="-1">
    In locale.
  </text>

  <!-- Tagline -->
  <text x="64" y="450" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="22" fill="#94a3b8">
    AI che gira sul tuo computer · nessun dato al cloud
  </text>

  <!-- Stats pills -->
  <!-- Pill 1: 16 formati -->
  <rect x="64" y="480" width="118" height="40" rx="20" fill="#1e40af" fill-opacity="0.7"/>
  <text x="123" y="505" font-family="Inter, system-ui, sans-serif"
        font-size="16" font-weight="600" fill="white" text-anchor="middle">16 formati</text>

  <!-- Pill 2: GDPR Art.9 -->
  <rect x="194" y="480" width="144" height="40" rx="20" fill="#14532d" fill-opacity="0.7"/>
  <rect x="194" y="480" width="144" height="40" rx="20" fill="none" stroke="#16a34a" stroke-width="1" stroke-opacity="0.5"/>
  <text x="266" y="505" font-family="Inter, system-ui, sans-serif"
        font-size="16" font-weight="600" fill="#86efac" text-anchor="middle">✓ GDPR Art.9</text>

  <!-- Pill 3: 100% locale -->
  <rect x="350" y="480" width="130" height="40" rx="20" fill="#1e40af" fill-opacity="0.7"/>
  <text x="415" y="505" font-family="Inter, system-ui, sans-serif"
        font-size="16" font-weight="600" fill="white" text-anchor="middle">100% locale</text>

  <!-- Pill 4: Windows + Linux -->
  <rect x="492" y="480" width="165" height="40" rx="20" fill="#1e40af" fill-opacity="0.7"/>
  <text x="574" y="505" font-family="Inter, system-ui, sans-serif"
        font-size="16" font-weight="600" fill="white" text-anchor="middle">Windows · Linux</text>

  <!-- Bottom tagline -->
  <text x="64" y="580" font-family="Inter, system-ui, sans-serif"
        font-size="16" fill="#475569">
    giandemoncell-prog.github.io/anonimizzatore
  </text>

  <!-- ── RIGHT SECTION: Big lock icon ─────────────────── -->

  <!-- Large rounded square background for icon -->
  <rect x="780" y="100" width="340" height="340" rx="70" fill="url(#iconbg)" opacity="0.9" filter="url(#glow)"/>

  <!-- Lock shackle (large) -->
  <path d="M872,304 C872,220 888,196 950,196 C1012,196 1028,220 1028,304"
        fill="none" stroke="white" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lock body (large) -->
  <rect x="836" y="296" width="228" height="188" rx="30" fill="url(#lockbody)"/>

  <!-- Keyhole (large) -->
  <circle cx="950" cy="378" r="28" fill="#1e3a8a"/>
  <rect x="939" y="378" width="22" height="38" rx="11" fill="#1e3a8a"/>

  <!-- Document lines in lock body (subtle, bottom) -->
  <rect x="876" y="454" width="148" height="11" rx="6" fill="#bfdbfe" opacity="0.5"/>
  <rect x="876" y="470" width="108" height="11" rx="6" fill="#bfdbfe" opacity="0.5"/>

  <!-- Decorative corner accents -->
  <circle cx="800" cy="130" r="6" fill="#3b82f6" opacity="0.4"/>
  <circle cx="1100" cy="130" r="4" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1100" cy="490" r="6" fill="#3b82f6" opacity="0.3"/>
  <circle cx="800" cy="490" r="4" fill="#3b82f6" opacity="0.4"/>

</svg>
